    // === GAME OVER SCENE ===
    class GameOverScene extends Phaser.Scene {
      constructor() {
        super('GameOverScene');
      }

      init(data) {
        this.victory = data.victory;
        this.finalScore = data.score;
        this.highScore = data.highScore;
        this.currentLevel = data.level || 1;
        this.unlockedNext = false;

        // Unlock next level on victory
        if (this.victory) {
          const nextLevel = this.currentLevel + 1;
          if (LEVELS[nextLevel] && !LEVELS[nextLevel].unlocked) {
            LEVELS[nextLevel].unlocked = true;
            this.unlockedNext = true;
            saveProgress();
          }
        }
      }

      create() {
        const width = this.cameras.main.width;
        const height = this.cameras.main.height;

        // Dark overlay
        this.add.rectangle(width/2, height/2, width, height, 0x000000, 0.7);

        // Panel background - UI asset
        const panelDepth = 10;
        createNineSlicePanel(this, 'ui-paper-special', width/2, height/2, 360, 360, {
          depth: panelDepth,
          alpha: 0.95
        });

        // Content depth - above panel
        const contentDepth = panelDepth + 1;

        // Result text
        const levelName = LEVELS[this.currentLevel]?.name || `Level ${this.currentLevel}`;
        const resultText = this.victory ? 'VICTORY!' : 'DEFEAT';
        const resultColor = this.victory ? '#7EC87E' : '#E88A7A';

        // Level name
        this.add.text(width/2, height/2 - 130, levelName, {
          fontSize: '16px',
          fill: '#999999'
        }).setOrigin(0.5).setDepth(contentDepth);

        const title = this.add.text(width/2, height/2 - 85, resultText, {
          fontSize: '48px',
          fill: resultColor,
          fontStyle: 'bold',
          stroke: '#1B1F2A',
          strokeThickness: 3
        }).setOrigin(0.5).setDepth(contentDepth);

        // Zoom pulse
        this.tweens.add({
          targets: title,
          scale: { from: 1, to: 1.03 },
          duration: 260,
          yoyo: true,
          repeat: -1
        });

        // Unlock notification
        let scoreY = height/2 - 20;
        if (this.unlockedNext) {
          const nextLevelName = LEVELS[this.currentLevel + 1]?.name || `Level ${this.currentLevel + 1}`;
          this.add.text(width/2, height/2 - 35, `${nextLevelName} Unlocked!`, {
            fontSize: '16px',
            fill: '#7EC87E',
            fontStyle: 'bold'
          }).setOrigin(0.5).setDepth(contentDepth);
          scoreY = height/2 + 5;
        }

        // Score
        this.add.text(width/2, scoreY, `Score: ${this.finalScore}`, {
          fontSize: '24px',
          fill: '#F6E27F',
          fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(contentDepth);

        // High score
        const isNewBest = this.finalScore >= this.highScore && this.finalScore > 0;
        this.add.text(width/2, scoreY + 35, `Best: ${this.highScore}${isNewBest ? ' - NEW!' : ''}`, {
          fontSize: '16px',
          fill: isNewBest ? '#7EC87E' : '#999999'
        }).setOrigin(0.5).setDepth(contentDepth);

        // Button options using asset buttons
        const btnY = height/2 + 100;

        // Retry button (blue round button)
        const retryBtnBg = this.add.image(width/2 - 70, btnY, 'btn-small-round-blue');
        retryBtnBg.setScale(0.75);
        retryBtnBg.setDepth(contentDepth);
        retryBtnBg.setInteractive({ useHandCursor: true });
        this.add.text(width/2 - 70, btnY - 2, '↻', {
          fontSize: '28px',
          fill: '#FFFFFF',
          fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(contentDepth + 1);

        retryBtnBg.on('pointerdown', () => {
          retryBtnBg.setTexture('btn-small-round-blue-pressed');
          this.time.delayedCall(100, () => this.retry());
        });
        retryBtnBg.on('pointerover', () => retryBtnBg.setTint(0xCCCCCC));
        retryBtnBg.on('pointerout', () => {
          retryBtnBg.clearTint();
          retryBtnBg.setTexture('btn-small-round-blue');
        });

        // Next Level / World Map button
        if (this.victory && LEVELS[this.currentLevel + 1]) {
          const nextBtnBg = this.add.image(width/2 + 70, btnY, 'btn-small-round-blue');
          nextBtnBg.setScale(0.75);
          nextBtnBg.setDepth(contentDepth);
          nextBtnBg.setInteractive({ useHandCursor: true });
          this.add.text(width/2 + 70, btnY - 2, '▶', {
            fontSize: '28px',
            fill: '#FFFFFF',
            fontStyle: 'bold'
          }).setOrigin(0.5).setDepth(contentDepth + 1);

          nextBtnBg.on('pointerdown', () => {
            nextBtnBg.setTexture('btn-small-round-blue-pressed');
            this.time.delayedCall(100, () => this.nextLevel());
          });
          nextBtnBg.on('pointerover', () => nextBtnBg.setTint(0xCCCCCC));
          nextBtnBg.on('pointerout', () => {
            nextBtnBg.clearTint();
            nextBtnBg.setTexture('btn-small-round-blue');
          });
        } else {
          const mapBtnBg = this.add.image(width/2 + 70, btnY, 'btn-small-round-blue');
          mapBtnBg.setScale(0.75);
          mapBtnBg.setDepth(contentDepth);
          mapBtnBg.setInteractive({ useHandCursor: true });
          this.add.text(width/2 + 70, btnY - 2, '⌂', {
            fontSize: '24px',
            fill: '#FFFFFF',
            fontStyle: 'bold'
          }).setOrigin(0.5).setDepth(contentDepth + 1);

          mapBtnBg.on('pointerdown', () => {
            mapBtnBg.setTexture('btn-small-round-blue-pressed');
            this.time.delayedCall(100, () => this.goToMap());
          });
          mapBtnBg.on('pointerover', () => mapBtnBg.setTint(0xCCCCCC));
          mapBtnBg.on('pointerout', () => {
            mapBtnBg.clearTint();
            mapBtnBg.setTexture('btn-small-round-blue');
          });
        }

        // Button labels below
        this.add.text(width/2 - 70, btnY + 42, 'RETRY', {
          fontSize: '11px',
          fill: '#CCCCCC',
          fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(contentDepth);

        const rightBtnLabel = (this.victory && LEVELS[this.currentLevel + 1]) ? 'NEXT' : 'MAP';
        this.add.text(width/2 + 70, btnY + 42, rightBtnLabel, {
          fontSize: '11px',
          fill: '#CCCCCC',
          fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(contentDepth);

        // Input
        this.input.keyboard.on('keydown-ENTER', () => this.retry());
        this.input.keyboard.on('keydown-SPACE', () => this.retry());
        this.input.keyboard.on('keydown-M', () => this.goToMap());
        this.input.keyboard.on('keydown-N', () => {
          if (this.victory && LEVELS[this.currentLevel + 1]) this.nextLevel();
        });
      }

      retry() {
        startLevelWithOptionalIntro(this, this.currentLevel);
      }

      nextLevel() {
        startLevelWithOptionalIntro(this, this.currentLevel + 1);
      }

      goToMap() {
        this.scene.start('WorldMapScene');
      }
    }

    // === GAME CONFIG ===
    const config = {
      type: Phaser.AUTO,
      width: 960,
      height: 540,
      parent: 'game-container',
      backgroundColor: '#7FAE5E',
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
      },
      physics: {
        default: 'arcade',
        arcade: {
          gravity: { y: 0 },
          debug: false
        }
      },
      scene: [BootScene, UITestScene, MenuScene, WorldMapScene, LevelIntroScene, GameScene, UIScene, PauseScene, GameOverScene],
      input: {
        activePointers: 2
      }
    };

    // === START ===
    window.game = new Phaser.Game(config);
  </script>
</body>
</html>
